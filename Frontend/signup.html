<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

    <!-- Heading -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">
            Create Account
        </h1>

        <p class="text-gray-500 mt-2">
            Sign up to get started
        </p>
    </div>

    <!-- Signup Form -->
    <form id="signupForm">

        <!-- Username -->
        <div class="mb-5">
            <label class="block text-gray-700 font-medium mb-2">
                Username
            </label>

            <input
                    type="text"
                    id="username"
                    placeholder="Enter your username"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none"
                    required>
        </div>

        <!-- Email -->
        <div class="mb-5">
            <label class="block text-gray-700 font-medium mb-2">
                Email
            </label>

            <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none"
                    required>
        </div>

        <!-- Password -->
        <div class="mb-5">
            <label class="block text-gray-700 font-medium mb-2">
                Password
            </label>

            <input
                    type="password"
                    id="password"
                    placeholder="Create a password"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none"
                    required>
        </div>

        <!-- Role -->
        <div class="mb-6">
            <label class="block text-gray-700 font-medium mb-2">
                Select Role
            </label>

            <select
                    id="role"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none"
                    required>

                <option value="">Choose your role</option>
                <option value="STUDENT">Student</option>
                <option value="TEACHER">Teacher</option>

            </select>
        </div>

        <!-- Signup Button -->
        <button
                type="submit"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-lg font-semibold hover:opacity-90 transition">
            Create Account
        </button>

    </form>

    <!-- Message -->
    <p id="message" class="text-center mt-5 font-semibold"></p>

    <!-- Login Link -->
    <div class="text-center mt-6 text-gray-500">
        Already have an account?

        <a href="/login.html"
           class="text-blue-600 font-semibold hover:underline">
            Login
        </a>
    </div>

</div>

<script>

document.getElementById("signupForm").addEventListener("submit", async function(event){

    event.preventDefault();

    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const role = document.getElementById("role").value;

    const message = document.getElementById("message");

    message.innerHTML = "Creating account...";
    message.className = "text-center mt-5 text-blue-600 font-semibold";

    try{

        const response = await fetch("http://localhost:8080/api/auth/signup",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                username:username,
                email:email,
                password:password,
                role:role
            })

        });

        const result = await response.text();

        if(response.ok){

            message.innerHTML = result;
            message.className = "text-center mt-5 text-green-600 font-semibold";

            setTimeout(function(){
                window.location.href="/login.html";
            },1500);

        }else{

            message.innerHTML = result;
            message.className = "text-center mt-5 text-red-600 font-semibold";
        }

    }catch(error){

        console.error(error);

        message.innerHTML = "Unable to connect to server.";
        message.className = "text-center mt-5 text-red-600 font-semibold";

    }

});

</script>

</body>
</html>
