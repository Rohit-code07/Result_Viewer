<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Viewer - Login</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.12);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Background Blur -->
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-blue-100 rounded-full blur-3xl opacity-80"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-indigo-100 rounded-full blur-3xl opacity-80"></div>

    <!-- Login Card -->
    <div class="glass-card relative z-10 w-full max-w-md rounded-3xl shadow-xl p-10">

        <!-- Logo -->
        <div class="text-center mb-8">

            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 shadow-lg shadow-blue-200 mb-5">

                <svg xmlns="http://www.w3.org/2000/svg"
                     class="w-8 h-8 text-white"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor">

                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M12 14l9-5-9-5-9 5 9 5zm0 0v6m0-6L3 9m9 5l9-5"/>

                </svg>

            </div>

            <h1 class="text-3xl font-extrabold text-blue-900">
                Welcome Back
            </h1>

            <p class="text-slate-500 mt-2">
                Login to your Result Viewer account
            </p>

        </div>

        <form id="loginForm">

            <!-- Email -->
            <div class="mb-5">

                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">
                    Email Address
                </label>

                <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition">

            </div>

            <!-- Password -->
            <div class="mb-5">

                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">
                    Password
                </label>

                <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition">

            </div>

            <!-- Remember -->
            <div class="flex items-center justify-between mb-7">

                <label class="flex items-center text-sm text-slate-600">

                    <input type="checkbox" class="mr-2 rounded">

                    Remember Me

                </label>

                <a href="#" class="text-sm font-semibold text-blue-600 hover:text-blue-700">
                    Forgot Password?
                </a>

            </div>

            <!-- Login Button -->
            <button
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold shadow-lg shadow-blue-200 transition-all duration-300">

                Login

            </button>

        </form>

        <!-- Message -->
        <p id="message" class="text-center mt-5 font-semibold"></p>

        <!-- Signup -->
        <div class="text-center mt-7 text-slate-500">

            Don't have an account?

            <a href="/signup.html"
               class="font-semibold text-blue-600 hover:text-blue-700">

                Sign Up

            </a>

        </div>

    </div>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(event) {

    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const message = document.getElementById("message");

    message.innerHTML = "Logging in...";
    message.className = "text-center mt-5 text-blue-600 font-semibold";

   try {
console.log("Form Submitted");
    const response = await fetch("http://localhost:8080/api/auth/login", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            email: email,
            password: password
        })

    });
console.log("Response:", response);

    const result = await response.json();
console.log("Result:", result);
    if (response.ok) {

        message.innerHTML = result.message;
        message.className = "text-center mt-5 text-green-600 font-semibold";

        setTimeout(() => {

            if (result.role === "ADMIN") {

                window.location.href = "admin-dashboard.html";

            } else if (result.role === "STUDENT") {

                window.location.href = "student-dashboard.html";

            } else {

                message.innerHTML = "Unknown user role.";
                message.className = "text-center mt-5 text-red-600 font-semibold";

            }

        }, 1000);

    } else {

        message.innerHTML = result.message;
        message.className = "text-center mt-5 text-red-600 font-semibold";

    }

} catch (error) {

    console.error(error);

    message.innerHTML = "Unable to connect to server.";
    message.className = "text-center mt-5 text-red-600 font-semibold";

}
});

</script>

</body>
</html>
